<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - TopDrive</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
  <section class="container py-5">
    <h2 class="text-center mb-4">Entre em Contato</h2>
    <p class="lead text-center mb-5">
      Tem dúvidas, sugestões ou quer compartilhar uma história automotiva? Fale com a gente! 
    </p>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <form>
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
          </div>
          <div class="mb-3">
            <label for="mensagem" class="form-label">Mensagem</label>
            <textarea class="form-control" id="mensagem" rows="4" placeholder="Escreva sua mensagem"></textarea>
          </div>
          <button type="submit" class="btn btn-dark w-100">Enviar</button>
        </form>
      </div>
    </div>

    
    <div class="row mt-5 text-center">
      <div class="col-md-4">
        <h5>Email</h5>
        <p>contato@topdrive.com</p>
      </div>
      <div class="col-md-4">
        <h5>Telefone</h5>
        <p>(85) 99999-9999</p>
      </div>
      <div class="col-md-4">
        <h5>Redes Sociais</h5>
        <p>
          <a href="#" class="text-decoration-none me-2">Instagram</a> |
          <a href="#" class="text-decoration-none ms-2">Facebook</a>
        </p>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('../navbar.html')
      .then(response => response.text())
      .then(data => {
        document.body.insertAdjacentHTML('afterbegin', data);
      });
      fetch('../footer.html')
      .then(response => response.text())
      .then(data => {
        document.body.insertAdjacentHTML('beforeend', data);
      });
  </script>
</body>
</html>
